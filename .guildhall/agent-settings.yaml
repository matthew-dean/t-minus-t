version: 1
project:
  concurrent_task_dispatch:
    position:
      kind: serial
    rationale: start serial; Spec Agent widens fanout once project maturity and runtime isolation allow it
    setAt: 2026-04-25T06:30:04.330Z
    setBy: system-default
  worktree_isolation:
    position: none
    rationale: no isolation until fanout is enabled
    setAt: 2026-04-25T06:30:04.330Z
    setBy: system-default
  merge_policy:
    position: ff_only_local
    rationale: local-first; Spec Agent upgrades to ff_only_with_push or manual_pr on project signal
    setAt: 2026-04-25T06:30:04.330Z
    setBy: system-default
  rejection_dampening:
    position:
      kind: off
    rationale: dampening off until repeated-rejection shape is observed
    setAt: 2026-04-25T06:30:04.330Z
    setBy: system-default
  business_envelope_strictness:
    position: advisory
    rationale: advisory by default; Spec Agent tightens to strict for production work
    setAt: 2026-04-25T06:30:04.330Z
    setBy: system-default
  agent_health_strictness:
    position: standard
    rationale: 2-minute stall threshold — balances local-LLM latency against stuck-detection
    setAt: 2026-04-25T06:30:04.330Z
    setBy: system-default
  remediation_autonomy:
    position: confirm_destructive
    rationale: coordinator may act on non-destructive remediations; restart_clean / shelve_task /
      pause_task_line require a human
    setAt: 2026-04-25T06:30:04.330Z
    setBy: system-default
  runtime_isolation:
    position: none
    rationale: no slot allocation until fanout is enabled
    setAt: 2026-04-25T06:30:04.330Z
    setBy: system-default
  workspace_import_autonomy:
    position: suggest
    rationale: detect existing signals in a non-empty workspace; draft an inventory and wait for human
      approval before mutating TASKS.json
    setAt: 2026-04-25T06:30:04.330Z
    setBy: system-default
domains:
  default:
    task_origination:
      position: agent_proposed_coordinator_approved
      rationale: agents may propose; coordinator approves — the middle-ground that enables emergent work
        without losing human-visible provenance
      setAt: 2026-04-25T06:30:04.330Z
      setBy: system-default
    spec_completeness:
      position: stage_appropriate
      rationale: spec fidelity grows with task maturity — the Spec Agent decides what each stage needs
      setAt: 2026-04-25T06:30:04.330Z
      setBy: system-default
    pre_rejection_policy:
      position: requeue_with_dampening
      rationale: pre-rejections are signals, not verdicts — requeue and let dampening suppress repeat shapes
      setAt: 2026-04-25T06:30:04.330Z
      setBy: system-default
    completion_approval:
      position: coordinator_sufficient
      rationale: gates + coordinator review is enough to mark done; Spec Agent tightens to human_required
        when risk is high
      setAt: 2026-04-25T06:30:04.330Z
      setBy: system-default
    reviewer_mode:
      position: llm_with_deterministic_fallback
      rationale: prefer LLM reviewer; fall back to deterministic rubric when the LLM is unavailable
      setAt: 2026-04-25T06:30:04.330Z
      setBy: system-default
    reviewer_fanout_policy:
      position: strict
      rationale: every persona must approve; worker synthesizes dissenting revisions. Coordinator
        adjudication turns on once conflicts prove recurrent.
      setAt: 2026-04-25T06:30:04.330Z
      setBy: system-default
    max_revisions:
      position: 3
      rationale: three revision passes before escalation — enough for iteration, short enough to surface
        systemic spec issues
      setAt: 2026-04-25T06:30:04.330Z
      setBy: system-default
    escalation_on_ambiguity:
      position: coordinator_first
      rationale: let the coordinator try first; escalate to human only if coordinator cannot resolve
      setAt: 2026-04-25T06:30:04.330Z
      setBy: system-default
    crash_recovery_default:
      position: prefer_resume
      rationale: favor resume over restart to preserve in-flight work; coordinator overrides per-incident
        if checkpoint looks corrupted
      setAt: 2026-04-25T06:30:04.330Z
      setBy: system-default
  overrides: {}
